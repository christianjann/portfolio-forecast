# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true

# The system java-latest-openjdk may lack IMAGE_TYPE=JDK in its release file,
# causing Gradle's toolchain detection to report no JAVA_COMPILER capability.
# Set ANDROID_STUDIO_HOME in your environment (or the justfile) and build.sh
# will export JAVA_HOME=$ANDROID_STUDIO_HOME/jbr before invoking Gradle.
# Alternatively, override directly:
#org.gradle.java.home=/path/to/jdk